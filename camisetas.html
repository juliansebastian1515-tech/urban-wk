<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camisetas - Urban W&K</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
    <div class="header-container">

        <nav class="nav-desktop">
            <a href="index.html">Inicio</a>
            <a href="index.html#productos">Productos</a>
            <a href="colecciones.html">Colecciones</a>
            <a href="nosotros.html">Nosotros</a>
        </nav>

        <div class="header-actions">

            <button class="cart-btn" onclick="toggleCart()">
                🛒
                <span id="cart-count" class="cart-count">0</span>
            </button>

            <div class="logo">
                <a href="index.html">
                    <img src="imagenes/logo.jpg" alt="Urban W&K Logo">
                </a>
            </div>

            <button class="menu-toggle" onclick="toggleMenu()">☰</button>

        </div>

    </div>

    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html" onclick="toggleMenu()">Inicio</a>
        <a href="index.html#productos" onclick="toggleMenu()">Productos</a>
        <a href="colecciones.html" onclick="toggleMenu()">Colecciones</a>
        <a href="nosotros.html" onclick="toggleMenu()">Nosotros</a>
    </div>

</header>

<section class="products-section">

    <div class="section-header">
        <h2 class="section-title">CAMISETAS</h2>
        <div class="section-line"></div>
    </div>

    <div class="products-grid">

        <div class="product-card">
            <div class="product-image">
                <img src="imagenes/camiseta1.jpg" alt="Camiseta">
            </div>

            <div class="product-info">
                <h3 class="product-name">Nombre Camiseta</h3>
                <p class="product-category">Camisetas</p>

                <div class="product-footer">
                    <span class="product-price">$0</span>
                    <button class="btn-add">Comprar</button>
                </div>
            </div>
        </div>

    </div>

</section>
<div class="cart-modal" id="cart-modal">
    <div class="cart-overlay" onclick="toggleCart()"></div>

    <div class="cart-panel">
        <div class="cart-header">
            <h2>TU CARRITO</h2>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>

        <div class="cart-body">
            <div id="cart-items" class="cart-items">
                <p class="empty-cart">Tu carrito está vacío</p>
            </div>
        </div>

        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">$0</span>
            </div>

            <button class="btn-checkout" onclick="checkout()">
                FINALIZAR COMPRA
            </button>
        </div>
    </div>
</div>
<script src="script.js"></script>

</body>
</html>
