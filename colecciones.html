<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colecciones - Urban W&K</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
    <div class="header-container">

        <nav class="nav-desktop">
            <a href="index.html">Inicio</a>
            <a href="index.html#productos">Productos</a>
            <a href="colecciones.html">Colecciones</a>
            <a href="nosotros.html">Nosotros</a>
        </nav>

        <div class="header-actions">

            <button class="cart-btn" onclick="toggleCart()">
                🛒
                <span id="cart-count" class="cart-count">0</span>
            </button>

            <div class="logo">
                <a href="index.html">
                    <img src="imagenes/logo.jpg" alt="Urban W&K Logo">
                </a>
            </div>

            <button class="menu-toggle" onclick="toggleMenu()">☰</button>

        </div>

    </div>

    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html" onclick="toggleMenu()">Inicio</a>
        <a href="index.html#productos" onclick="toggleMenu()">Productos</a>
        <a href="colecciones.html" onclick="toggleMenu()">Colecciones</a>
        <a href="nosotros.html" onclick="toggleMenu()">Nosotros</a>
    </div>

</header>

<section class="products-section">

    <div class="section-header">
        <h2 class="section-title">COLECCIONES</h2>
        <div class="section-line"></div>
    </div>

    <div class="products-grid">

        <a class="product-card" href="camisetas.html" style="text-decoration:none; color:inherit;">
            <div class="product-image">
                <img src="imagenes/camisetas.jpg" alt="Camisetas">
            </div>
            <div class="product-info">
                <h3 class="product-name">Camisetas</h3>
                <p class="product-category">Explorar colección</p>
            </div>
        </a>

        <a class="product-card" href="oversize.html" style="text-decoration:none; color:inherit;">
            <div class="product-image">
                <img src="imagenes/oversize.jpg" alt="Oversize">
            </div>
            <div class="product-info">
                <h3 class="product-name">Oversize</h3>
                <p class="product-category">Explorar colección</p>
            </div>
        </a>

        <a class="product-card" href="buzos.html" style="text-decoration:none; color:inherit;">
            <div class="product-image">
                <img src="imagenes/buzos.jpg" alt="Buzos">
            </div>
            <div class="product-info">
                <h3 class="product-name">Buzos</h3>
                <p class="product-category">Explorar colección</p>
            </div>
        </a>

        <a class="product-card" href="bermudas.html" style="text-decoration:none; color:inherit;">
            <div class="product-image">
                <img src="imagenes/bermudas.jpg" alt="Bermudas">
            </div>
            <div class="product-info">
                <h3 class="product-name">Bermudas</h3>
                <p class="product-category">Explorar colección</p>
            </div>
        </a>

        <a class="product-card" href="accesorios.html" style="text-decoration:none; color:inherit;">
            <div class="product-image">
                <img src="imagenes/accesorios.jpg" alt="Accesorios">
            </div>
            <div class="product-info">
                <h3 class="product-name">Accesorios</h3>
                <p class="product-category">Explorar colección</p>
            </div>
        </a>

    </div>

</section>
<div class="cart-modal" id="cart-modal">
    <div class="cart-overlay" onclick="toggleCart()"></div>

    <div class="cart-panel">
        <div class="cart-header">
            <h2>TU CARRITO</h2>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>

        <div class="cart-body">
            <div id="cart-items" class="cart-items">
                <p class="empty-cart">Tu carrito está vacío</p>
            </div>
        </div>

        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">$0</span>
            </div>

            <button class="btn-checkout" onclick="checkout()">
                FINALIZAR COMPRA
            </button>
        </div>
    </div>
</div>
<script src="script.js"></script>

</body>
</html>
